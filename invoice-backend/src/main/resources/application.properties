quarkus.http.port=8080

invoice.max-lines=25
invoice.max-amount=1000000000

# CORS — locked to frontend origin; override in production via env var
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ALLOWED_ORIGIN:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,X-API-Key

# API key — set INVOICE_API_KEY env var in production; fallback for local dev only
invoice.api-key=${INVOICE_API_KEY:dev-secret-key}

maven.home=3.9.3
