services:
  backend:
    build: ../invoice-backend
    ports:
      - "8080:8080"
    environment:
      INVOICE_API_KEY: ${INVOICE_API_KEY:-dev-secret-key}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:3000}
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8080' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8080
      API_KEY: ${INVOICE_API_KEY:-dev-secret-key}
    depends_on:
      backend:
        condition: service_healthy
